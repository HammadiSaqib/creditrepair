<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upcoming Events API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .result { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Upcoming Events API</h1>
        
        <button onclick="testUpcomingEvents()">Test Upcoming Events API</button>
        <button onclick="testCalendarEvents()">Test Calendar Events API</button>
        <button onclick="clearResults()">Clear Results</button>
        
        <div id="results"></div>
    </div>

    <script>
        function addResult(title, content, isError = false) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isError ? 'error' : 'success'}`;
            div.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            results.appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testUpcomingEvents() {
            try {
                const token = localStorage.getItem('auth_token');
                if (!token) {
                    addResult('Error', 'No auth token found in localStorage', true);
                    return;
                }

                addResult('Info', `Using token: ${token.substring(0, 20)}...`);

                const response = await fetch('/api/calendar/admin/upcoming', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const responseText = await response.text();
                addResult('Upcoming Events Response', `Status: ${response.status}\n\nResponse:\n${responseText}`, !response.ok);

                if (response.ok) {
                    const data = JSON.parse(responseText);
                    if (data.success && data.data.upcoming_events) {
                        addResult('Upcoming Events Count', `Found ${data.data.upcoming_events.length} upcoming events`);
                        data.data.upcoming_events.forEach((event, index) => {
                            addResult(`Event ${index + 1}`, `Title: ${event.title}\nDate: ${event.date}\nTime: ${event.time}\nType: ${event.type}`);
                        });
                    }
                }
            } catch (error) {
                addResult('Error', `Failed to test upcoming events: ${error.message}`, true);
            }
        }

        async function testCalendarEvents() {
            try {
                const token = localStorage.getItem('auth_token');
                if (!token) {
                    addResult('Error', 'No auth token found in localStorage', true);
                    return;
                }

                const currentDate = new Date();
                const month = currentDate.getMonth() + 1;
                const year = currentDate.getFullYear();

                const response = await fetch(`/api/calendar/admin/events?month=${month}&year=${year}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const responseText = await response.text();
                addResult('Calendar Events Response', `Status: ${response.status}\n\nResponse:\n${responseText}`, !response.ok);

                if (response.ok) {
                    const data = JSON.parse(responseText);
                    if (data.success && data.data.events) {
                        addResult('Calendar Events Count', `Found ${data.data.events.length} calendar events for ${month}/${year}`);
                    }
                }
            } catch (error) {
                addResult('Error', `Failed to test calendar events: ${error.message}`, true);
            }
        }

        // Auto-run tests when page loads
        window.onload = function() {
            addResult('Info', 'Page loaded. Click buttons to test APIs.');
        };
    </script>
</body>
</html>
