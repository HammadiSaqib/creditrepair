<!DOCTYPE html>
<html>
<head>
    <title>Debug Support Settings API</title>
</head>
<body>
    <h1>Debug Support Settings API</h1>
    <button onclick="testLogin()">1. Test Login</button>
    <button onclick="testSettingsAPI()">2. Test Settings API</button>
    <button onclick="testWithoutAuth()">3. Test Without Auth</button>
    <div id="result" style="white-space: pre-wrap; background: #f5f5f5; padding: 10px; margin: 10px 0;"></div>

    <script>
        let authToken = null;

        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'support@creditrepair.com',
                        password: 'support123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    authToken = data.token;
                    resultDiv.innerHTML = `✅ Login successful!\nToken: ${data.token.substring(0, 20)}...\nUser: ${JSON.stringify(data.user, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `❌ Login failed:\nStatus: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Login error: ${error.message}`;
            }
        }

        async function testSettingsAPI() {
            const resultDiv = document.getElementById('result');
            
            if (!authToken) {
                resultDiv.innerHTML = '❌ Please login first';
                return;
            }
            
            resultDiv.innerHTML = 'Testing settings API...';
            
            try {
                const response = await fetch('/api/support/settings/all', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const contentType = response.headers.get('content-type');
                resultDiv.innerHTML += `\nStatus: ${response.status}\nContent-Type: ${contentType}\n`;
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    resultDiv.innerHTML += `✅ JSON Response:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    const text = await response.text();
                    resultDiv.innerHTML += `❌ Non-JSON Response:\n${text}`;
                }
            } catch (error) {
                resultDiv.innerHTML += `\n❌ Settings API error: ${error.message}`;
            }
        }

        async function testWithoutAuth() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing settings API without auth...';
            
            try {
                const response = await fetch('/api/support/settings/all', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const contentType = response.headers.get('content-type');
                resultDiv.innerHTML += `\nStatus: ${response.status}\nContent-Type: ${contentType}\n`;
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    resultDiv.innerHTML += `Response:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    const text = await response.text();
                    resultDiv.innerHTML += `Non-JSON Response:\n${text}`;
                }
            } catch (error) {
                resultDiv.innerHTML += `\n❌ Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
