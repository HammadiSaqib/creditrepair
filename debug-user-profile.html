<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug User Profile</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-info { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #eee; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>User Profile Debug</h1>
    <div id="results"></div>

    <script>
        async function debugUserProfile() {
            const results = document.getElementById('results');
            
            try {
                // Check if token exists
                const token = localStorage.getItem('auth_token') || localStorage.getItem('token');
                results.innerHTML += `<div class="debug-info">
                    <h3>Token Status</h3>
                    <p>Token exists: ${token ? 'Yes' : 'No'}</p>
                    <p>Token preview: ${token ? token.substring(0, 20) + '...' : 'None'}</p>
                </div>`;

                if (!token) {
                    results.innerHTML += `<div class="debug-info error">
                        <h3>Error</h3>
                        <p>No authentication token found. Please log in first.</p>
                    </div>`;
                    return;
                }

                // Fetch user profile
                const response = await fetch('/api/auth/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                
                results.innerHTML += `<div class="debug-info">
                    <h3>API Response</h3>
                    <p>Status: ${response.status}</p>
                    <p>Response OK: ${response.ok}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;

                if (data && data.data) {
                    const profile = data.data;
                    results.innerHTML += `<div class="debug-info ${profile.role === 'admin' ? 'success' : ''}">
                        <h3>User Profile Details</h3>
                        <p><strong>Name:</strong> ${profile.first_name} ${profile.last_name}</p>
                        <p><strong>Email:</strong> ${profile.email}</p>
                        <p><strong>Role:</strong> ${profile.role}</p>
                        <p><strong>Company:</strong> ${profile.company_name || 'N/A'}</p>
                        <p><strong>Is Admin:</strong> ${profile.role === 'admin' ? 'YES' : 'NO'}</p>
                        <p><strong>Button should show:</strong> ${profile.role === 'admin' ? 'YES' : 'NO'}</p>
                    </div>`;
                } else {
                    results.innerHTML += `<div class="debug-info error">
                        <h3>Profile Error</h3>
                        <p>Could not retrieve user profile data</p>
                    </div>`;
                }

            } catch (error) {
                results.innerHTML += `<div class="debug-info error">
                    <h3>Error</h3>
                    <p>${error.message}</p>
                    <pre>${error.stack}</pre>
                </div>`;
            }
        }

        // Run debug on page load
        debugUserProfile();
    </script>
</body>
</html>
