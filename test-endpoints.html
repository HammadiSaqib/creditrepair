<!DOCTYPE html>
<html>
<head>
    <title>Test Endpoints</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px; margin: 5px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Test API Endpoints</h1>
    
    <h2>Test Basic Auth</h2>
    <button onclick="testLogin()">Test Login</button>
    <div id="login-result" class="result"></div>
    
    <h2>Test Endpoints That Use JOINs</h2>
    <button onclick="testDisputes()">Test Disputes (uses JOIN)</button>
    <div id="disputes-result" class="result"></div>
    
    <button onclick="testDisputeStats()">Test Dispute Stats (uses JOIN with GROUP BY)</button>
    <div id="stats-result" class="result"></div>

    <script>
        let authToken = null;

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'demo@creditrepairpro.com',
                        password: 'demo123'
                    })
                });
                const data = await response.json();
                
                if (data.token) {
                    authToken = data.token;
                    resultDiv.innerHTML = `✅ Login successful!\nToken: ${data.token.substring(0, 20)}...`;
                } else {
                    resultDiv.innerHTML = `❌ Login failed:\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        async function testDisputes() {
            const resultDiv = document.getElementById('disputes-result');
            resultDiv.innerHTML = 'Testing disputes endpoint...';
            
            if (!authToken) {
                resultDiv.innerHTML = '❌ Please login first';
                return;
            }
            
            try {
                const response = await fetch('/api/disputes', {
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                resultDiv.innerHTML = `Status: ${response.status}\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        async function testDisputeStats() {
            const resultDiv = document.getElementById('stats-result');
            resultDiv.innerHTML = 'Testing dispute stats endpoint...';
            
            if (!authToken) {
                resultDiv.innerHTML = '❌ Please login first';
                return;
            }
            
            try {
                const response = await fetch('/api/disputes/stats', {
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                resultDiv.innerHTML = `Status: ${response.status}\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
