<!DOCTYPE html>
<html>
<head>
    <title>Token Test</title>
</head>
<body>
    <h1>Token Test</h1>
    <div id="result"></div>
    <script>
        const token = localStorage.getItem('auth_token');
        const result = document.getElementById('result');
        
        if (token) {
            result.innerHTML = '<p>Token found: ' + token.substring(0, 20) + '...</p>';
            
            // Test the API endpoint
            fetch('/api/super-admin/subscriptions/recent-cancellations', {
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                result.innerHTML += '<p>API Response Status: ' + response.status + '</p>';
                return response.text();
            })
            .then(data => {
                result.innerHTML += '<p>API Response: ' + data + '</p>';
            })
            .catch(error => {
                result.innerHTML += '<p>API Error: ' + error.message + '</p>';
            });
        } else {
            result.innerHTML = '<p>No token found in localStorage</p>';
        }
    </script>
</body>
</html>
