<!DOCTYPE html>
<html>
<head>
    <title>Debug Authentication</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px; margin: 5px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Authentication Debug Tools</h1>
    
    <div class="test-section">
        <h2>Check Users in Database</h2>
        <button onclick="checkUsers()">Check Users</button>
        <div id="users-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test Password for Demo User</h2>
        <button onclick="testPassword()">Test demo@creditrepairpro.com / demo123</button>
        <div id="password-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Reset Database</h2>
        <button onclick="resetDatabase()" style="background: #dc3545; color: white;">Reset Database (Fresh Start)</button>
        <div id="reset-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Test Login API</h2>
        <button onclick="testLogin()">Test Login API</button>
        <div id="login-result" class="result"></div>
    </div>

    <script>
        async function checkUsers() {
            const resultDiv = document.getElementById('users-result');
            resultDiv.innerHTML = 'Checking users...';
            
            try {
                const response = await fetch('/api/debug/users');
                const data = await response.json();
                resultDiv.innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }

        async function testPassword() {
            const resultDiv = document.getElementById('password-result');
            resultDiv.innerHTML = 'Testing password...';
            
            try {
                const response = await fetch('/api/debug/test-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'demo@creditrepairpro.com',
                        password: 'demo123'
                    })
                });
                const data = await response.json();
                resultDiv.innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }

        async function resetDatabase() {
            const resultDiv = document.getElementById('reset-result');
            resultDiv.innerHTML = 'Resetting database...';

            try {
                const response = await fetch('/api/debug/reset-database', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                resultDiv.innerHTML = JSON.stringify(data, null, 2);

                if (data.success) {
                    // Refresh other results after reset
                    setTimeout(() => {
                        checkUsers();
                        testPassword();
                    }, 1000);
                }
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = 'Testing login...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'demo@creditrepairpro.com',
                        password: 'demo123'
                    })
                });
                const data = await response.json();
                resultDiv.innerHTML = `Status: ${response.status}\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
